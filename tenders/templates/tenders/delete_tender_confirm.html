{% extends "base.html" %}

{% block title %}Confirm Deletion{% endblock %}

{% block content %}
<div class="p-4 md:p-8 max-w-lg mx-auto w-full space-y-6 text-center">

    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-8">
        <h1 class="text-xl font-bold text-gray-900">Confirm Deletion</h1>
        <p class="text-sm text-gray-600 mt-2">
            Are you sure you want to permanently delete the tender: <strong class="text-red-600">"{{ tender.title }}"</strong>?
            This action cannot be undone.
        </p>
        <form method="post" class="mt-6 flex justify-center gap-4">
            {% csrf_token %}
            <a href="{% url 'tenders:list_tenders' %}" class="btn-secondary">Cancel</a>
            <button type="submit" class="btn-danger">Yes, Delete Tender</button>
        </form>
    </div>
</div>
{% endblock %}
