{% extends 'base.html' %}

{% block title %}
Forgot Password
{% endblock %}

{% block content %}
<section class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 px-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md transform transition-all duration-300 hover:shadow-2xl">
        
        <!-- Logo & Header -->
        <div class="text-center">
            <h1 class="text-4xl font-extrabold tracking-tight text-blue-600 drop-shadow-sm">
                EduPs
            </h1>
            <h2 class="text-xl font-semibold text-gray-800 mt-4">Forgot Password?</h2>
            <p class="text-sm text-gray-500 mt-2">
                Enter your email address below and we'll send you a secure OTP code.
            </p>
        </div>

        <!-- Form Section -->
        <form id="otpForm" method="POST" class="mt-8 space-y-5">
            {% csrf_token %}

            <!-- Email Input Group -->
            <div class="relative">
                <label for="email" class="text-xs font-semibold text-gray-600 uppercase tracking-wider block mb-2">
                    Email Address
                </label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="name@example.com"
                    required
                    class="w-full border border-gray-300 rounded-xl px-4 py-3 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-200">
            </div>

            <!-- Submit Button -->
            <button
                type="submit"
                id="submitBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-xl shadow-md hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition duration-200 flex items-center justify-center space-x-2">
                <span id="btnText">Send OTP Code</span>
                
                <!-- Loading Spinner (hidden by default) -->
                <svg id="spinner" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>

        <!-- Back to Login Link -->
        <div class="mt-6 text-center">
            <a href="#" class="text-sm font-medium text-blue-600 hover:text-blue-700 transition duration-150">
                &larr; Back to Sign In
            </a>
        </div>
    </div>
</section>

<!-- Frontend Logic -->
<script>
    document.getElementById('otpForm').addEventListener('submit', function(e) {
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');
        const emailInput = document.getElementById('email');

        // Prevent double submission if already processing
        if (submitBtn.disabled) {
            e.preventDefault();
            return;
        }

        // Basic client-side check
        if (emailInput.value.trim() !== "") {
            // Disable button to prevent multiple clicks
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-75', 'cursor-not-allowed');
            
            // Switch text to loading state & show spinner
            btnText.textContent = "Sending Code...";
            spinner.classList.remove('hidden');
        }
    });
</script>
{% endblock %}
