{% extends 'base.html' %}

{% block title %}
Reset Password
{% endblock %}

{% block content %}
<section class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 via-white to-indigo-100 py-12 px-4 transition-all duration-500">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8 transform transition-all duration-500 hover:shadow-2xl relative overflow-hidden border border-gray-100/50">
        
        <!-- Subtle Decorative Accent Header Line -->
        <div class="absolute top-0 left-0 right-0 h-1.5 bg-blue-600 shadow-sm animate-pulse-slow"></div>

        <!-- Heading Zone -->
        <div class="text-center mb-8 relative">
            <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight text-gray-900">
                Reset Password
            </h1>
            <p class="text-sm text-gray-500 mt-2">
                Create a strong, secure new password for your account.
            </p>
        </div>

        <!-- Reset Password Form -->
        <form id="reset-form" method="POST" novalidate class="space-y-6">
            {% csrf_token %}

            <!-- New Password Field -->
            <div class="floating-label-group relative">
                <div class="relative">
                    <input type="password" id="new-password" name="password" required placeholder=" " class="password-input w-full border border-gray-200 rounded-xl pl-4 pr-12 py-3.5 text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all placeholder-transparent">
                    <label class="absolute left-4 top-3.5 text-gray-400 pointer-events-none transition-all text-sm bg-white px-1">New Password</label>
                    <button type="button" class="toggle-password absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-blue-600 focus:outline-none">
                        <svg class="h-5 w-5 eye-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
                
                <!-- Password Strength Meter Tracker -->
                <div class="strength-container mt-2 bg-gray-100 rounded-full h-1 w-full overflow-hidden hidden">
                    <div class="strength-bar h-full bg-red-500 transition-all duration-300 w-0"></div>
                </div>
                <p class="error-msg text-xs text-red-500 mt-1 hidden">Password cannot be left blank.</p>
            </div>

            <!-- Confirm Password Field -->
            <div class="floating-label-group relative">
                <div class="relative">
                    <input type="password" id="confirm-password" name="confirm_password" required placeholder=" " class="password-input w-full border border-gray-200 rounded-xl pl-4 pr-12 py-3.5 text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all placeholder-transparent">
                    <label class="absolute left-4 top-3.5 text-gray-400 pointer-events-none transition-all text-sm bg-white px-1">Confirm New Password</label>
                    <button type="button" class="toggle-password absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-blue-600 focus:outline-none">
                        <svg class="h-5 w-5 eye-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
                <p id="match-error" class="error-msg text-xs text-red-500 mt-1 hidden">Passwords do not match.</p>
            </div>

            <!-- Action Button -->
            <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 px-4 rounded-xl shadow-md hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-all duration-200 flex items-center justify-center space-x-2">
                <span id="btn-text">Update Password</span>
                <svg id="spinner" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            </button>
        </form>

        <!-- Secondary Action Footer Links -->
        <div class="text-center mt-8 border-t border-gray-100 pt-6">
            <p class="text-sm text-gray-500">
                Remember your password?
                <a href="{% url 'accounts:login_page' %}" class="text-blue-600 font-semibold hover:text-blue-700 transition duration-150 ml-1">
                    Back to Login
                </a>
            </p>
        </div>

    </div>
</section>

<!-- Advanced Presentation CSS Overrides -->
<style>
    @keyframes pulseSlow {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
    }
    .animate-pulse-slow {
        animation: pulseSlow 3s ease-in-out infinite;
    }

    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-6px); }
        75% { transform: translateX(6px); }
    }
    .animate-shake {
        animation: shake 0.35s ease-in-out;
    }

    /* Floating Labels Styling Engine */
    .floating-label-group input:focus ~ label,
    .floating-label-group input:not(:placeholder-shown) ~ label {
        transform: translateY(-1.45rem) scale(0.85);
        color: #2563eb;
    }
    .floating-label-group input:focus {
        padding-top: 1.25rem;
        padding-bottom: 0.5rem;
    }
    .floating-label-group label {
        transform-origin: left top;
        transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), color 0.2s;
    }

    /* Validation Field Status Indicators */
    .field-invalid {
        border-color: #ef4444 !important;
        background-color: #fef2f2;
    }
</style>

<!-- Enhanced Architecture Interaction Script Layer -->
<script>
    const resetForm = document.getElementById('reset-form');
    const newPassword = document.getElementById('new-password');
    const confirmPassword = document.getElementById('confirm-password');
    const matchError = document.getElementById('match-error');
    const submitBtn = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');
    const spinner = document.getElementById('spinner');

    // Password Visibility Eye Toggles
    document.querySelectorAll('.toggle-password').forEach(button => {
        button.addEventListener('click', function() {
            const container = this.closest('.relative');
            const passwordField = container.querySelector('.password-input');
            const eyeIcon = this.querySelector('.eye-icon');
            
            const isPassword = passwordField.getAttribute('type') === 'password';
            passwordField.setAttribute('type', isPassword ? 'text' : 'password');
            
            if (isPassword) {
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />`;
            } else {
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />`;
            }
        });
    });

    // Real-Time Password Strength Gauge Engine
    newPassword.addEventListener('input', function() {
        const container = this.closest('.floating-label-group');
        const metricsBox = container.querySelector('.strength-container');
        const indicatorBar = container.querySelector('.strength-bar');
        const val = this.value;
        
        if (val.length === 0) {
            metricsBox.classList.add('hidden');
            return;
        }
        
        metricsBox.classList.remove('hidden');
        let score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        // Shift color styles based on strength calculation
        if (score <= 1) {
            indicatorBar.className = "strength-bar h-full bg-red-500 transition-all duration-300";
            indicatorBar.style.width = "25%";
        } else if (score <= 3) {
            indicatorBar.className = "strength-bar h-full bg-yellow-500 transition-all duration-300";
            indicatorBar.style.width = "65%";
        } else {
            indicatorBar.className = "strength-bar h-full bg-green-500 transition-all duration-300";
            indicatorBar.style.width = "100%";
        }

        // Inline check validation if confirm window was already filled out
        if (confirmPassword.value.trim()) {
            checkPasswordMatch();
        }
    });

    // Confirmation Field Watcher
    confirmPassword.addEventListener('input', checkPasswordMatch);

    function checkPasswordMatch() {
        const isMatch = newPassword.value === confirmPassword.value;
        if (!isMatch && confirmPassword.value.length > 0) {
            confirmPassword.classList.add('field-invalid');
            matchError.classList.remove('hidden');
            return false;
        } else {
            confirmPassword.classList.remove('field-invalid');
            matchError.classList.add('hidden');
            return true;
        }
    }

    // Comprehensive Pre-Submission Interceptor
    resetForm.addEventListener('submit', function(e) {
        let isFormValid = true;

        // Verify base requirements aren't empty strings
        if (!newPassword.value.trim()) {
            newPassword.classList.add('field-invalid');
            newPassword.closest('.floating-label-group').querySelector('.error-msg').classList.remove('hidden');
            isFormValid = false;
        } else {
            newPassword.classList.remove('field-invalid');
            newPassword.closest('.floating-label-group').querySelector('.error-msg').classList.add('hidden');
        }

        // Verify matches criteria accurately
        if (!checkPasswordMatch() || !confirmPassword.value.trim()) {
            confirmPassword.classList.add('field-invalid');
            matchError.classList.remove('hidden');
            isFormValid = false;
        }

        // Animate Container Error if Invalid
        if (!isFormValid) {
            e.preventDefault();
            const card = this.closest('div');
            card.classList.add('animate-shake');
            setTimeout(() => card.classList.remove('animate-shake'), 400);
            return;
        }

        // Processing Submit State Transformation
        submitBtn.disabled = true;
        submitBtn.classList.add('opacity-75', 'cursor-not-allowed');
        btnText.textContent = "Updating Password...";
        spinner.classList.remove('hidden');
    });
</script>
{% endblock %}
