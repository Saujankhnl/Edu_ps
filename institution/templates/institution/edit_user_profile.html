{% extends 'base.html' %}

{% block title %}Edit My Profile{% endblock %}

{% block content %}
<div class="bg-gray-100 min-h-screen py-12">
    <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
            <div class="p-8">
                <h1 class="text-2xl font-bold text-gray-900">Edit My Profile</h1>
                <p class="text-sm text-gray-500 mt-1">Update your personal information.</p>

                <form method="POST" class="mt-6 space-y-6" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    {% for field in form %}
                    <div>
                        <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700">{{ field.label }}</label>
                        <div class="mt-1">
                            {{ field }}
                        </div>
                        {% if field.errors %}
                            <p class="mt-2 text-sm text-red-600">{{ field.errors|first }}</p>
                        {% endif %}
                    </div>
                    {% endfor %}

                    <div class="flex justify-end space-x-3 pt-4 border-t border-gray-200">
                        <a href="{% url 'institution:user_profile' %}" class="bg-white py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50">Cancel</a>
                        <button type="submit" class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<style>
    input, textarea, select {
        display: block;
        width: 100%;
        padding: 0.5rem 0.75rem;
        border: 1px solid #d1d5db;
        border-radius: 0.375rem;
    }
</style>
{% endblock %}
