{% extends "base.html" %}

{% block title %}Create New Tender{% endblock %}

{% block content %}
<div class="bg-gray-50 min-h-screen p-4 sm:p-6 lg:p-8">
    <div class="max-w-2xl mx-auto">
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-gray-900">Create New Tender</h1>
            <p class="text-sm text-gray-500">Fill out the details below. The tender will be saved as a draft.</p>
        </div>

        <div class="bg-white p-6 sm:p-8 rounded-lg shadow-sm">
            <form method="POST">
                {% csrf_token %}
                <div class="space-y-6">
                    <div>
                        <label for="{{ form.title.id_for_label }}" class="block text-sm font-medium text-gray-700">Tender Title</label>
                        {{ form.title }}
                    </div>
                    <div>
                        <label for="{{ form.description.id_for_label }}" class="block text-sm font-medium text-gray-700">Description</label>
                        {{ form.description }}
                    </div>
                    <div>
                        <label for="{{ form.deadline.id_for_label }}" class="block text-sm font-medium text-gray-700">Submission Deadline</label>
                        {{ form.deadline }}
                    </div>
                </div>
                <div class="mt-8 pt-5 border-t border-gray-200 flex justify-end space-x-3">
                    <a href="{% url 'institution:dashboard' %}" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md shadow-sm hover:bg-gray-50">Cancel</a>
                    <button type="submit" class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700">Save as Draft</button>
                </div>
            </form>
        </div>
    </div>
</div>
<style>
    .form-input {
        display: block;
        width: 100%;
        padding: 0.5rem 0.75rem;
        border: 1px solid #d1d5db;
        border-radius: 0.375rem;
    }
</style>
{% endblock %}
